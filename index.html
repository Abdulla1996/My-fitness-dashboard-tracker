<title>THE FORGE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap');
  :root{
    --bg:#0A0B0D; --panel:#15171C; --panel2:#1B1E24; --line:#2A2E37;
    --steel:#8A93A0; --text:#F4F2EE; --molten:#FF4D2E; --amber:#FFB020;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:radial-gradient(1200px 500px at 50% -10%, rgba(255,77,46,0.10), transparent 60%), var(--bg);
    color:var(--text); font-family:'Inter',system-ui,sans-serif;
    min-height:100vh; padding:max(18px,env(safe-area-inset-top)) 14px calc(60px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:1040px; margin:0 auto;}
  .anton{font-family:'Anton',sans-serif; letter-spacing:.5px; font-weight:400;}
  .tnum{font-variant-numeric:tabular-nums;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none}}
  @keyframes emberPulse{0%,100%{opacity:.55} 50%{opacity:1}}
  .rise{animation:fadeUp .45s ease both;}
  .eyebrow{font-size:11px; letter-spacing:4px; font-weight:800; color:var(--molten);}
  .h1{font-size:clamp(40px,12vw,76px); line-height:.92; margin-top:6px;}
  .sub{color:var(--steel); font-weight:600; font-size:13px; margin-top:8px;}
  .statcards{display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-top:18px;}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:13px 10px;}
  .statv{font-size:clamp(22px,6.5vw,32px); line-height:1;}
  .statl{font-size:9px; font-weight:800; letter-spacing:1px; color:var(--steel); margin-top:6px;}
  .heatbar{height:10px; border-radius:6px; background:#1F222A; overflow:hidden; border:1px solid var(--line); margin-top:14px;}
  .heatfill{height:100%; background:linear-gradient(90deg,#FF8A1F,#FF4D2E); transition:width .5s ease;}
  .tabs{display:flex; gap:5px; margin-top:18px; background:var(--panel2); padding:5px; border-radius:14px; border:1px solid var(--line);}
  .tab{cursor:pointer; flex:1; text-align:center; padding:11px 4px; border-radius:11px; font-weight:800; font-size:11px; letter-spacing:.6px; color:var(--steel); background:transparent; border:1px solid transparent; transition:all .2s ease;}
  .tab.on{color:var(--text); background:var(--panel); border-color:var(--line);}
  .grid{display:grid; gap:11px; margin-top:14px;}
  @media(min-width:620px){.grid{grid-template-columns:1fr 1fr;}}
  @media(min-width:920px){.grid{grid-template-columns:1fr 1fr 1fr;}}
  .legend{display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; font-size:10px; color:var(--steel); font-weight:600;}
  .legend span{display:inline-flex; align-items:center; gap:4px;}
  .daycard{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:13px; transition:box-shadow .35s ease, border-color .35s ease;}
  .daycard.ignited{border-color:#FF8A3D; box-shadow:0 0 0 1px rgba(255,138,61,.35), 0 0 32px -8px rgba(255,77,46,.55);}
  .dhead{display:flex; align-items:center; justify-content:space-between; margin-bottom:11px;}
  .pills{display:grid; grid-template-columns:repeat(6,1fr); gap:6px;}
  .pill{cursor:pointer; border:1px solid var(--line); background:var(--panel2); border-radius:12px; padding:8px 2px; display:flex; flex-direction:column; align-items:center; gap:3px; transition:transform .12s ease, box-shadow .25s ease, background .25s ease, border-color .25s ease; user-select:none;}
  .pill:active{transform:scale(.93);}
  .pill .ic{font-size:18px; filter:grayscale(.7) opacity(.6); transition:filter .2s ease;}
  .pill .lb{font-size:8px; font-weight:800; letter-spacing:.4px; color:var(--steel);}
  .pill.on{background:linear-gradient(160deg,#FF6A2C,#FF3B2E); border-color:#FF8A3D; box-shadow:0 0 0 1px rgba(255,138,61,.4), 0 6px 18px -6px rgba(255,77,46,.7);}
  .pill.on .ic{filter:none;}
  .pill.on .lb{color:#1A0E08;}
  .narrow{max-width:760px; margin:14px auto 0;}
  .pgday{cursor:pointer; width:100%; text-align:left; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 15px; color:var(--text); display:flex; align-items:center; justify-content:space-between; margin-bottom:11px;}
  .chip{font-size:9px; font-weight:800; letter-spacing:.7px; padding:3px 7px; border-radius:6px; display:inline-block;}
  .move{background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:11px 12px; margin-bottom:8px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px;}
  .wlabel{font-size:9px; font-weight:800; letter-spacing:.8px; color:var(--steel); margin-bottom:5px; display:block;}
  .winput{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:11px; color:var(--text); font-size:15px; font-family:'Inter',sans-serif; width:100%; outline:none; font-variant-numeric:tabular-nums;}
  .winput:focus{border-color:#FF8A3D;}
  .btn{cursor:pointer; background:linear-gradient(160deg,#FF6A2C,#FF3B2E); border:none; color:#1A0E08; font-weight:800; letter-spacing:1px; border-radius:12px; padding:13px; font-size:13px; width:100%;}
  .btn:disabled{opacity:.4; cursor:not-allowed; filter:grayscale(.5);}
  .btn:active:not(:disabled){transform:scale(.98);}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--steel); font-weight:700; letter-spacing:.5px;}
  .wtop{display:grid; grid-template-columns:1fr; gap:11px;}
  @media(min-width:480px){.wtop{grid-template-columns:1.2fr 1fr;}}
  .wopt{display:grid; grid-template-columns:1fr; gap:11px;}
  @media(min-width:480px){.wopt{grid-template-columns:1fr 1fr 1fr;}}
  .sertog{cursor:pointer; border-radius:9px; padding:7px 11px; font-size:10px; font-weight:800; letter-spacing:.6px; border:1px solid var(--line); background:var(--panel2); display:inline-flex; align-items:center; gap:7px; user-select:none;}
  .sertog:active{transform:scale(.95);}
  .dot{width:9px; height:9px; border-radius:50%;}
  .row{display:flex; align-items:center; justify-content:space-between; background:var(--panel2); border:1px solid var(--line); border-radius:11px; padding:10px 13px;}
  .delx{cursor:pointer; background:transparent; border:none; color:var(--steel); font-size:15px; padding:2px 6px;}
  .delx:active{color:var(--molten);}
  .gcompound{display:grid; grid-template-columns:1.4fr 1fr; gap:8px; margin-bottom:8px;}
  .footer{text-align:center; margin-top:40px; font-size:10px; letter-spacing:2px; color:#3A3F49; font-weight:700;}
  svg{display:block;}
</style>
</head>
<body>
<div class="wrap">
  <div class="rise">
    <div class="eyebrow">30-DAY PROTOCOL · RECOMP</div>
    <div class="anton h1">THE FORGE</div>
    <div class="sub">105 KG · 19% BF · PHYSIQUE · <span style="color:var(--amber)">discipline heats the iron</span></div>
    <div class="statcards" id="headerStats"></div>
    <div class="heatbar"><div class="heatfill" id="heatfill" style="width:0%"></div></div>
    <div class="tabs">
      <div class="tab on" data-tab="tracker">TRACKER</div>
      <div class="tab" data-tab="program">PROGRAM</div>
      <div class="tab" data-tab="weight">WEIGHT</div>
      <div class="tab" data-tab="gear">GEAR</div>
      <div class="tab" data-tab="protocol">PROTOCOL</div>
    </div>
  </div>
  <div id="content"></div>
  <div class="footer">EARN THE PUMP · FORGE THE MONSTER</div>
</div>

<script>
/* ===================== storage ===================== */
var K = { tracker:"forge_tracker", weight:"forge_weight", gear:"forge_gear" };
function load(k, fb){ try{ var v=localStorage.getItem(k); return v? JSON.parse(v): fb; }catch(e){ return fb; } }
function save(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

/* ===================== constants ===================== */
var DAYS = 30;
var CYCLE = [
  {name:"CHEST", color:"#FF4D2E"},

function daysBetween(a,b){ return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000); }

/* ===================== header stats ===================== */
function computeStats(){
  var trained=0, totalChecks=0, perfect=0, best=0, run=0, trainTotal=0;
  for(var d=1; d<=DAYS; d++){
    var w=workoutFor(d), day=tracker[d], checks=0;
    METRICS.forEach(function(m){ if(day[m.key]) checks++; });
    totalChecks+=checks; if(checks===METRICS.length) perfect++;
    if(w.name!=="REST"){ trainTotal++; if(day.trained){ run++; if(run>best) best=run; trained++; } else run=0; }
  }
  return { trained:trained, trainTotal:trainTotal, perfect:perfect, best:best,
           consistency:Math.round(totalChecks/(DAYS*METRICS.length)*100) };
}
function renderHeader(){
  var s=computeStats();
  var cards=[
    {v:s.trained+"/"+s.trainTotal, l:"TRAINED"},
    {v:s.best+(s.best>0?" 🔥":""), l:"BEST STREAK", fire:true},
    {v:s.perfect, l:"PERFECT DAYS"},
    {v:s.consistency+"%", l:"CONSISTENCY"}
  ];
  document.getElementById("headerStats").innerHTML = cards.map(function(c){
    return '<div class="stat"><div class="anton tnum statv" style="color:'+(c.fire?"var(--molten)":"var(--text)")+'">'+c.v+'</div><div class="statl">'+c.l+'</div></div>';

}

function drawChart(){
  var el=document.getElementById("wChart");
  var W=600, H=300, padL=40, padR=(show.bodyfat?40:14), padT=12, padB=28;
  var plotW=W-padL-padR, plotH=H-padT-padB, n=weights.length;
  var kgVals=[], pctVals=[];
  weights.forEach(function(d){ ["weight","muscle","fatmass"].forEach(function(k){ if(show[k]&&d[k]!=null) kgVals.push(d[k]); }); if(show.bodyfat&&d.bodyfat!=null) pctVals.push(d.bodyfat); });
  function scale(v){ if(!v.length) return null; var mn=Math.min.apply(null,v), mx=Math.max.apply(null,v); if(mn===mx){mn-=1;mx+=1;} var p=(mx-mn)*0.12; return {mn:mn-p, mx:mx+p}; }
  var kg=scale(kgVals)||{mn:0,mx:1}, pct=scale(pctVals);
  function x(i){ return padL + (n===1? plotW/2 : plotW*i/(n-1)); }
  function yL(v){ return padT + plotH - ((v-kg.mn)/(kg.mx-kg.mn))*plotH; }
  function yR(v){ return pct? padT + plotH - ((v-pct.mn)/(pct.mx-pct.mn))*plotH : 0; }
  var svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet">';
  for(var i=0;i<=4;i++){ var yy=padT+plotH*i/4, fr=1-i/4;
    svg+='<line x1="'+padL+'" y1="'+yy+'" x2="'+(padL+plotW)+'" y2="'+yy+'" stroke="#2A2E37" stroke-dasharray="3 3"/>';
    svg+='<text x="'+(padL-6)+'" y="'+(yy+4)+'" fill="#8A93A0" font-size="11" text-anchor="end">'+Math.round(kg.mn+(kg.mx-kg.mn)*fr)+'</text>';
    if(pct){ svg+='<text x="'+(padL+plotW+6)+'" y="'+(yy+4)+'" fill="#FFB020" font-size="11" text-anchor="start">'+Math.round(pct.mn+(pct.mx-pct.mn)*fr)+'</text>'; }
  }
  var step=Math.max(1,Math.ceil(n/6));
  weights.forEach(function(d,i){ if(i%step===0||i===n-1){ svg+='<text x="'+x(i).toFixed(1)+'" y="'+(H-8)+'" fill="#8A93A0" font-size="11" text-anchor="middle">'+fmtDate(d.date)+'</text>'; } });
  SERIES.forEach(function(s){ if(!show[s.key]) return; var useR=s.axis==="pct"; if(useR&&!pct) return;
    var pts=[]; weights.forEach(function(d,i){ if(d[s.key]!=null) pts.push([x(i),(useR?yR(d[s.key]):yL(d[s.key]))]); });
    if(!pts.length) return;
    var path=pts.map(function(p){ return p[0].toFixed(1)+","+p[1].toFixed(1); }).join(" ");
    svg+='<polyline points="'+path+'" fill="none" stroke="'+s.color+'" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>';
    pts.forEach(function(p){ svg+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="'+s.color+'"/>'; });
  });
  svg+='</svg>';
  el.innerHTML=svg;
}
function drawHistory(){
  var h=document.getElementById("wHistory");
  h.innerHTML=weights.slice().reverse().map(function(e){
    var extra="";
    if(e.muscle!=null) extra+='<span class="tnum" style="font-size:12px; color:#3FE08F">'+e.muscle+' musc</span>';
    if(e.bodyfat!=null) extra+='<span class="tnum" style="font-size:12px; color:#FFB020">'+e.bodyfat+'% bf</span>';
    if(e.fatmass!=null) extra+='<span class="tnum" style="font-size:12px; color:#6FA8C9">'+e.fatmass+' fat</span>';
    return '<div class="row"><div style="display:flex; align-items:baseline; gap:12px; flex-wrap:wrap">'+
      '<span style="font-weight:800; font-size:13px; min-width:56px">'+fmtDate(e.date)+'</span>'+
      '<span class="tnum" style="font-size:13px; color:#FF6A2C; font-weight:700">'+e.weight+' kg</span>'+extra+'</div>'+
      '<button class="delx" data-date="'+e.date+'">✕</button></div>';
  }).join("");
  var dels=h.querySelectorAll(".delx");
  for(var i=0;i<dels.length;i++){ (function(b){ b.addEventListener("click", function(){
    weights=weights.filter(function(e){ return e.date!==b.dataset.date; }); save(K.weight,weights); drawWeightBody();
  }); })(dels[i]); }
}

/* ===================== GEAR (log + reminder only) ===================== */
function renderGearTab(){
  var html='<div class="rise narrow">';
  html+='<div class="card" style="margin-bottom:16px"><div class="anton" style="font-size:18px; color:var(--molten); margin-bottom:4px">WHAT I\'M RUNNING</div>'+
    '<div style="font-size:11px; color:var(--steel); margin-bottom:13px">Type each compound and your dose. Up to four.</div>';
  for(var c=0;c<4;c++){
    html+='<div class="gcompound"><input class="winput" id="gName'+c+'" placeholder="Compound '+(c+1)+'" value="'+esc(gear.compounds[c]?gear.compounds[c].name:"")+'">'+
      '<input class="winput" id="gDose'+c+'" placeholder="Dose" value="'+esc(gear.compounds[c]?gear.compounds[c].dose:"")+'"></div>';
  }
  html+='</div>';
  html+='<div class="card" style="margin-bottom:16px"><div class="anton" style="font-size:18px; color:var(--molten); margin-bottom:13px">INJECTION SCHEDULE</div>'+
    '<div class="wtop" style="margin-bottom:12px">'+
      '<div><label class="wlabel">INJECTION DATE</label><input class="winput" type="date" id="gDate" value="'+todayStr()+'"></div>'+
      '<div><label class="wlabel">REMIND EVERY (DAYS)</label><input class="winput" type="number" inputmode="numeric" id="gInterval" value="'+gear.interval+'"></div></div>'+
    '<button class="btn" id="gLog">LOG INJECTION</button></div>';
  html+='<div id="gStatus"></div>';
  html+='<div id="gHistory" style="margin-top:16px; display:flex; flex-direction:column; gap:8px"></div>';
  html+='<div style="margin-top:18px; font-size:11px; color:var(--steel); line-height:1.5; padding:0 4px">'+
    '<b style="color:var(--text)">Note:</b> a home-screen web app can\'t fire phone alarms on its own. Use <b style="color:var(--amber)">“Add next dose to Calendar”</b> below to drop a real reminder into your iPhone Calendar with an alert. Keep bloodwork and BP checks regular while you run this.</div>';
  html+='</div>';
  content.innerHTML=html;

  for(var c=0;c<4;c++){ (function(i){
    document.getElementById("gName"+i).addEventListener("input", function(e){ gear.compounds[i].name=e.target.value; save(K.gear,gear); });
    document.getElementById("gDose"+i).addEventListener("input", function(e){ gear.compounds[i].dose=e.target.value; save(K.gear,gear); });
  })(c); }
  document.getElementById("gInterval").addEventListener("input", function(e){ var v=parseInt(e.target.value,10); gear.interval=(isNaN(v)||v<1)?1:v; save(K.gear,gear); drawGearStatus(); });
  document.getElementById("gLog").addEventListener("click", function(){
    var date=document.getElementById("gDate").value; if(!date) return;
    if(gear.log.indexOf(date)===-1){ gear.log.push(date); gear.log.sort(); save(K.gear,gear); }
    drawGearStatus(); drawGearHistory();
  });
  drawGearStatus(); drawGearHistory();
}
function drawGearStatus(){
  var el=document.getElementById("gStatus");
  if(!gear.log.length){ el.innerHTML='<div class="card" style="text-align:center; color:var(--steel)"><div class="anton" style="font-size:20px; color:#3A3F49">NO DOSES LOGGED</div><div style="font-size:12px; margin-top:6px">Log your first injection to start the schedule.</div></div>'; return; }
  var last=gear.log[gear.log.length-1];
  var next=addDays(last, gear.interval);
  var left=daysBetween(todayStr(), next);
  var leftTxt = left>1?("in "+left+" days") : left===1?"tomorrow" : left===0?"today" : (Math.abs(left)+" days overdue");
  var leftColor = left<0?"var(--molten)" : left===0?"var(--amber)" : "var(--text)";
  el.innerHTML='<div class="card" style="border-color:#FF8A3D55"><div class="statl" style="margin-bottom:6px">NEXT INJECTION</div>'+
    '<div style="display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap">'+
    '<div class="anton" style="font-size:30px">'+fmtDate(next)+'</div>'+
    '<div style="font-weight:800; font-size:14px; color:'+leftColor+'">'+leftTxt+'</div></div>'+
    '<div style="font-size:11px; color:var(--steel); margin-top:8px">Last dose '+fmtDate(last)+' · every '+gear.interval+' days · '+gear.log.length+' logged</div>'+
    '<button class="btn" id="gIcs" style="margin-top:13px">＋ ADD NEXT DOSE TO CALENDAR</button></div>';
  document.getElementById("gIcs").addEventListener("click", function(){ downloadIcs(next); });
}
function drawGearHistory(){
  var h=document.getElementById("gHistory");
  if(!gear.log.length){ h.innerHTML=""; return; }
  h.innerHTML=gear.log.slice().reverse().map(function(date, ri){
    var num=gear.log.length-ri;
    return '<div class="row"><div style="display:flex; align-items:baseline; gap:12px">'+
      '<span class="anton" style="font-size:16px; color:var(--molten)">#'+num+'</span>'+
      '<span style="font-weight:700; font-size:13px">'+fmtDate(date)+'</span></div>'+
      '<button class="delx" data-date="'+date+'">✕</button></div>';
  }).join("");
  var dels=h.querySelectorAll(".delx");
  for(var i=0;i<dels.length;i++){ (function(b){ b.addEventListener("click", function(){
    gear.log=gear.log.filter(function(d){ return d!==b.dataset.date; }); save(K.gear,gear); drawGearStatus(); drawGearHistory();
  }); })(dels[i]); }
}
function downloadIcs(dateStr){
  var dt=dateStr.replace(/-/g,"");
  var stamp=new Date().toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  var uid="forge-"+Date.now()+"@theforge";
  var ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//TheForge//Gear//EN","CALSCALE:GREGORIAN","BEGIN:VEVENT",
    "UID:"+uid,"DTSTAMP:"+stamp,"DTSTART:"+dt+"T090000","DTEND:"+dt+"T091500",
    "SUMMARY:Injection due","DESCRIPTION:Next dose (logged in THE FORGE)",
    "BEGIN:VALARM","TRIGGER:-PT30M","ACTION:DISPLAY","DESCRIPTION:Injection due","END:VALARM",
    "END:VEVENT","END:VCALENDAR"].join("\r\n");
  var blob=new Blob([ics],{type:"text/calendar"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a"); a.href=url; a.download="injection-"+dateStr+".ics"; document.body.appendChild(a); a.click();
  document.body.removeChild(a); setTimeout(function(){ URL.revokeObjectURL(url); },1500);
}

/* ===================== PROTOCOL + backup ===================== */
function renderProtocolTab(){
  var secs=[{t:"CARDIO",c:"#FF6A2C",items:PROTOCOL.cardio},{t:"NUTRITION",c:"#FFB020",items:PROTOCOL.nutrition},{t:"GOLDEN RULES",c:"#FF4D2E",items:PROTOCOL.rules}];
  var html='<div class="rise narrow" style="display:flex; flex-direction:column; gap:14px">';
  secs.forEach(function(sec){
    html+='<div class="card" style="padding-bottom:6px"><div class="anton" style="font-size:20px; color:'+sec.c+'; margin-bottom:10px">'+sec.t+'</div>';
    sec.items.forEach(function(it,i){ html+='<div style="display:flex; gap:10px; padding:8px 0; border-top:'+(i?"1px solid var(--line)":"none")+'"><span style="color:'+sec.c+'; font-weight:800">—</span><span style="font-size:13px; color:#D7DAE0; line-height:1.45">'+it+'</span></div>'; });
    html+='</div>';
  });
  html+='<div class="card"><div class="anton" style="font-size:20px; color:#6FA8C9; margin-bottom:6px">BACKUP</div>'+
    '<div style="font-size:12px; color:var(--steel); line-height:1.5; margin-bottom:13px">Export saves all your tracking, weigh-ins and gear log to a file. Import restores it on any device.</div>'+
    '<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">'+
    '<button class="btn ghost" id="expBtn">EXPORT BACKUP</button>'+
    '<button class="btn ghost" id="impBtn">IMPORT BACKUP</button></div>'+
    '<input type="file" id="impFile" accept="application/json" style="display:none"></div>';
  html+='</div>';
  content.innerHTML=html;
  document.getElementById("expBtn").addEventListener("click", exportBackup);
  document.getElementById("impBtn").addEventListener("click", function(){ document.getElementById("impFile").click(); });
  document.getElementById("impFile").addEventListener("change", importBackup);
}
function exportBackup(){
  var data={ tracker:tracker, weights:weights, gear:gear, v:1 };
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a"); a.href=url; a.download="forge-backup-"+todayStr()+".json"; document.body.appendChild(a); a.click();
  document.body.removeChild(a); setTimeout(function(){ URL.revokeObjectURL(url); },1500);
}
function importBackup(e){
  var f=e.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(){ try{ var d=JSON.parse(r.result);
    if(d.tracker) tracker=d.tracker; if(d.weights) weights=d.weights; if(d.gear) gear=d.gear;
    save(K.tracker,tracker); save(K.weight,weights); save(K.gear,gear);
    renderHeader(); renderTab(); alert("Backup restored.");
  }catch(err){ alert("Couldn't read that file."); } };
  r.readAsText(f);
}

/* ===================== boot ===================== */
renderHeader();
renderTab();
</script>
</body>
</html>
