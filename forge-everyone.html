<title>THE FORGE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap');
  :root{ --bg:#0A0B0D; --panel:#15171C; --panel2:#1B1E24; --line:#2A2E37; --steel:#8A93A0; --text:#F4F2EE; --molten:#FF4D2E; --amber:#FFB020; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{ background:radial-gradient(1200px 500px at 50% -10%, rgba(255,77,46,0.10), transparent 60%), var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; min-height:100vh; padding:max(18px,env(safe-area-inset-top)) 14px calc(60px + env(safe-area-inset-bottom)); }
  .wrap{max-width:1040px; margin:0 auto;}
  .anton{font-family:'Anton',sans-serif; letter-spacing:.5px; font-weight:400;}
  .tnum{font-variant-numeric:tabular-nums;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none}}
  .rise{animation:fadeUp .45s ease both;}
  .eyebrow{font-size:11px; letter-spacing:4px; font-weight:800; color:var(--molten);}
  .h1{font-size:clamp(40px,12vw,76px); line-height:.92; margin-top:6px;}
  .sub{color:var(--steel); font-weight:600; font-size:13px; margin-top:8px;}
  .statcards{display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-top:18px;}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:13px 10px;}
  .statv{font-size:clamp(20px,6vw,30px); line-height:1;}
  .statl{font-size:9px; font-weight:800; letter-spacing:1px; color:var(--steel); margin-top:6px;}
  .heatbar{height:10px; border-radius:6px; background:#1F222A; overflow:hidden; border:1px solid var(--line); margin-top:14px;}
  .heatfill{height:100%; background:linear-gradient(90deg,#FF8A1F,#FF4D2E); transition:width .5s ease;}
  .tabs{display:flex; gap:5px; margin-top:18px; background:var(--panel2); padding:5px; border-radius:14px; border:1px solid var(--line);}
  .tab{cursor:pointer; flex:1; text-align:center; padding:11px 3px; border-radius:11px; font-weight:800; font-size:10.5px; letter-spacing:.4px; color:var(--steel); background:transparent; border:1px solid transparent; transition:all .2s ease;}
  .tab.on{color:var(--text); background:var(--panel); border-color:var(--line);}
  .narrow{max-width:760px; margin:14px auto 0;}
  .legend{display:flex; flex-wrap:wrap; gap:10px; margin:14px 0; font-size:10px; color:var(--steel); font-weight:600;}
  .legend span{display:inline-flex; align-items:center; gap:4px;}
  .weekrow{cursor:pointer; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:13px 15px; display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; transition:border-color .25s ease, box-shadow .25s ease;}
  .weekrow.done{border-color:#FF8A3D; box-shadow:0 0 0 1px rgba(255,138,61,.3), 0 0 24px -10px rgba(255,77,46,.5);}
  .wdots{display:flex; gap:4px;}
  .wdot{width:8px; height:8px; border-radius:50%; background:#2A2E37;}
  .wdot.on{background:linear-gradient(160deg,#FF6A2C,#FF3B2E);}
  .weekbody{margin:-2px 0 16px;}
  .daycard{background:var(--panel2); border:1px solid var(--line); border-radius:14px; padding:12px; margin-bottom:9px;}
  .daycard.ignited{border-color:#FF8A3D; box-shadow:0 0 0 1px rgba(255,138,61,.3);}
  .dayrow{cursor:pointer; display:flex; align-items:center; justify-content:space-between; background:transparent; border:1px dashed var(--line); border-radius:12px; padding:12px 13px; margin-bottom:9px; transition:border-color .2s ease, background .2s ease;}
  .dayrow:active{transform:scale(.99);}
  .dayrow.done{background:rgba(255,77,46,.08); border:1px solid #FF8A3D88;}
  .dayedit{background:transparent; border:1px solid var(--line); border-radius:14px; padding:12px; margin-bottom:9px;}
  .dhead{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .pills{display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}
  .pill{cursor:pointer; border:1px solid var(--line); background:var(--bg); border-radius:11px; padding:8px 2px; display:flex; flex-direction:column; align-items:center; gap:3px; transition:transform .12s ease, box-shadow .25s ease, background .25s ease, border-color .25s ease; user-select:none;}
  .pill:active{transform:scale(.93);}
  .pill .ic{font-size:17px; filter:grayscale(.7) opacity(.6); transition:filter .2s ease;}
  .pill .lb{font-size:8px; font-weight:800; letter-spacing:.3px; color:var(--steel);}
  .pill.on{background:linear-gradient(160deg,#FF6A2C,#FF3B2E); border-color:#FF8A3D; box-shadow:0 0 0 1px rgba(255,138,61,.4);}
  .pill.on .ic{filter:none;}
  .pill.on .lb{color:#1A0E08;}
  .psel{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;}
  .pchip{cursor:pointer; padding:9px 13px; border-radius:11px; font-weight:800; font-size:11px; letter-spacing:.5px; border:1px solid var(--line); background:var(--panel2); color:var(--steel);}
  .pchip.on{color:var(--text); background:var(--panel); border-color:#FF8A3D88;}
  .pgday{cursor:pointer; width:100%; text-align:left; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 15px; color:var(--text); display:flex; align-items:center; justify-content:space-between; margin-bottom:11px;}
  .chip{font-size:9px; font-weight:800; letter-spacing:.7px; padding:3px 7px; border-radius:6px; display:inline-block;}
  .move{background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:11px 12px; margin-bottom:8px;}
  .loadrow{display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-top:9px; padding-left:29px;}
  .lin{background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:7px 6px; color:var(--text); font-size:13px; width:100%; outline:none; font-variant-numeric:tabular-nums; text-align:center;}
  .lin:focus{border-color:#FF8A3D;}
  .llab{font-size:8px; font-weight:800; letter-spacing:.4px; color:var(--steel); text-align:center; display:block; margin-bottom:3px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px;}
  .wlabel{font-size:9px; font-weight:800; letter-spacing:.8px; color:var(--steel); margin-bottom:5px; display:block;}
  .winput{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:11px; color:var(--text); font-size:15px; font-family:'Inter',sans-serif; width:100%; outline:none; font-variant-numeric:tabular-nums;}
  .winput:focus{border-color:#FF8A3D;}
  .btn{cursor:pointer; background:linear-gradient(160deg,#FF6A2C,#FF3B2E); border:none; color:#1A0E08; font-weight:800; letter-spacing:1px; border-radius:12px; padding:13px; font-size:13px; width:100%;}
  .btn:disabled{opacity:.4; cursor:not-allowed; filter:grayscale(.5);}
  .btn:active:not(:disabled){transform:scale(.98);}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--steel); font-weight:700; letter-spacing:.5px;}
  .wtop{display:grid; grid-template-columns:1fr; gap:11px;}
  @media(min-width:480px){.wtop{grid-template-columns:1.2fr 1fr;}}
  .wopt{display:grid; grid-template-columns:1fr; gap:11px;}
  @media(min-width:480px){.wopt{grid-template-columns:1fr 1fr 1fr;}}
  .sertog{cursor:pointer; border-radius:9px; padding:7px 11px; font-size:10px; font-weight:800; letter-spacing:.6px; border:1px solid var(--line); background:var(--panel2); display:inline-flex; align-items:center; gap:7px; user-select:none;}
  .dot{width:9px; height:9px; border-radius:50%;}
  .row{display:flex; align-items:center; justify-content:space-between; background:var(--panel2); border:1px solid var(--line); border-radius:11px; padding:10px 13px;}
  .delx{cursor:pointer; background:transparent; border:none; color:var(--steel); font-size:15px; padding:2px 6px;}
  .delx:active{color:var(--molten);}
  .gcompound{display:grid; grid-template-columns:1.4fr 1fr; gap:8px; margin-bottom:8px;}

  ["Cluster set","Break a heavy set into mini-sets of a few reps with 10–20s rest between each — lets you hit more quality heavy reps than one straight set."],
  ["Drop set","Take a set to failure, immediately strip 20–30% of the weight, and keep going. Repeat once or twice for a deep burn."],
  ["Rest-pause","Hit failure, rest just 15–20s, then squeeze out a few more reps. Repeat. More total reps with the same heavy load."],
  ["Myo-reps","One hard activation set near failure, then several mini-sets of 3–5 reps with only 5–10s rest. Time-efficient growth."],
  ["Superset","Two exercises back to back with no rest. An antagonist superset pairs opposites (e.g. curl + pushdown)."],
  ["Giant set","Three or more exercises for one muscle done back to back — a brutal pump finisher."],
  ["Lengthened partials","After full-range failure, keep doing partial reps in the stretched portion of the movement. Big growth stimulus."],
  ["Constant tension","Keep continuous tension on the muscle — no locking out or resting at the top or bottom of the rep."],
  ["Slow eccentric","Lower the weight slowly (3–4s) on the negative to increase time under tension and control."],
  ["1.5 reps","One full rep plus one half rep counts as a single rep — doubles time spent in the hardest part of the range."],
  ["RIR (reps in reserve)","How many reps you stop short of failure. \"1 RIR\" means you stop with one good rep left in the tank."]

  var consistency = compTotal? Math.round(compHit/compTotal*100) : 100;

    {v:dayBest+(dayBest>0?" 🔥":""), l:"DAY STREAK", fire:true},

var rtRemaining=90, rtPreset=90, rtRunning=false, rtId=null, rtCtx=null;
function mmss(s){ var m=Math.floor(s/60), ss=s%60; return m+":"+(ss<10?"0":"")+ss; }
function ensureCtx(){ try{ if(!rtCtx) rtCtx=new (window.AudioContext||window.webkitAudioContext)(); if(rtCtx && rtCtx.state==="suspended") rtCtx.resume(); }catch(e){} }
function updateRt(){ var d=document.getElementById("restDisplay"); if(d){ d.textContent=mmss(rtRemaining); d.style.color = rtRunning? "var(--molten)" : (rtRemaining===0? "var(--amber)":"var(--text)"); } var t=document.getElementById("rtToggle"); if(t) t.textContent = rtRunning? "PAUSE":"START"; }
function rtStop(){ rtRunning=false; if(rtId){ clearInterval(rtId); rtId=null; } updateRt(); }
function rtTick(){ if(rtRemaining>0){ rtRemaining--; updateRt(); if(rtRemaining===0){ rtStop(); rtBeep(); } } }
function rtStartInterval(){ if(rtId) clearInterval(rtId); rtId=setInterval(rtTick,1000); }
function rtToggle(){ if(rtRunning){ rtStop(); } else { if(rtRemaining<=0) rtRemaining=rtPreset; rtRunning=true; rtStartInterval(); updateRt(); } }
function rtSetStart(sec){ rtPreset=sec; rtRemaining=sec; rtRunning=true; rtStartInterval(); updateRt(); }
function rtReset(){ rtStop(); rtRemaining=rtPreset; updateRt(); }
function rtBeep(){ try{ ensureCtx(); if(rtCtx){ var o=rtCtx.createOscillator(), g=rtCtx.createGain(); o.connect(g); g.connect(rtCtx.destination); o.type="sine"; o.frequency.value=880; var t0=rtCtx.currentTime; g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.35,t0+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.7); o.start(t0); o.stop(t0+0.72); } }catch(e){} try{ if(navigator.vibrate) navigator.vibrate([200,100,200]); }catch(e){} }

function getLoad(pid,di,n){ return (loads[pid] && loads[pid][di] && loads[pid][di][n]) || {s:"",e:"",r:""}; }
function setLoad(pid,di,n,f,v){ if(!loads[pid])loads[pid]={}; if(!loads[pid][di])loads[pid][di]={}; if(!loads[pid][di][n])loads[pid][di][n]={s:"",e:"",r:""}; loads[pid][di][n][f]=v; save(K.loads,loads); }

    '<div class="stat"><div class="anton tnum" style="font-size:25px">'+last.weight+'<span style="font-size:12px; color:var(--steel)"> kg</span></div><div class="statl">LATEST</div></div>'+
    '<div class="stat"><div class="anton tnum" style="font-size:25px; color:'+(delta<=0?"#3FE08F":"var(--molten)")+'">'+(delta>0?"+":"")+delta+'<span style="font-size:12px; color:var(--steel)"> kg</span></div><div class="statl">CHANGE</div></div>'+
    '<div class="stat"><div class="anton tnum" style="font-size:25px; color:var(--amber)">'+(last.bodyfat!=null?last.bodyfat:"—")+(last.bodyfat!=null?'<span style="font-size:12px; color:var(--steel)"> %</span>':"")+'</div><div class="statl">BODY FAT</div></div></div>';
  html+='<div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px" id="wToggles"></div>';
  html+='<div class="card" style="padding:14px 6px 8px 0" id="wChart"></div>';
  html+='<div style="margin-top:16px; display:flex; flex-direction:column; gap:8px" id="wHistory"></div>';
  body.innerHTML=html; drawToggles(); drawChart(); drawHistory();
}
function drawToggles(){
  var t=document.getElementById("wToggles");
  t.innerHTML=SERIES.map(function(s){ var on=show[s.key];
    return '<div class="sertog" data-k="'+s.key+'" style="opacity:'+(on?1:.45)+'; border-color:'+(on?s.color+"66":"var(--line)")+'"><span class="dot" style="background:'+(on?s.color:"var(--steel)")+'"></span><span style="color:'+(on?"var(--text)":"var(--steel)")+'; text-decoration:'+(on?"none":"line-through")+'">'+s.label+'</span></div>';
  }).join("");
  var chips=t.querySelectorAll(".sertog");
  for(var i=0;i<chips.length;i++){ (function(c){ c.addEventListener("click", function(){ show[c.dataset.k]=!show[c.dataset.k]; drawToggles(); drawChart(); }); })(chips[i]); }
}
function drawChart(){
  var el=document.getElementById("wChart");
  var W=600,H=300,padL=40,padR=(show.bodyfat?40:14),padT=12,padB=28,plotW=W-padL-padR,plotH=H-padT-padB,n=weights.length;
  var kgVals=[],pctVals=[];
  weights.forEach(function(d){ ["weight","muscle","fatmass"].forEach(function(k){ if(show[k]&&d[k]!=null) kgVals.push(d[k]); }); if(show.bodyfat&&d.bodyfat!=null) pctVals.push(d.bodyfat); });
  function scale(v){ if(!v.length) return null; var mn=Math.min.apply(null,v),mx=Math.max.apply(null,v); if(mn===mx){mn-=1;mx+=1;} var p=(mx-mn)*0.12; return {mn:mn-p,mx:mx+p}; }
  var kg=scale(kgVals)||{mn:0,mx:1}, pct=scale(pctVals);
  function x(i){ return padL + (n===1? plotW/2 : plotW*i/(n-1)); }
  function yL(v){ return padT + plotH - ((v-kg.mn)/(kg.mx-kg.mn))*plotH; }
  function yR(v){ return pct? padT + plotH - ((v-pct.mn)/(pct.mx-pct.mn))*plotH : 0; }
  var svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet">';
  for(var i=0;i<=4;i++){ var yy=padT+plotH*i/4, fr=1-i/4;
    svg+='<line x1="'+padL+'" y1="'+yy+'" x2="'+(padL+plotW)+'" y2="'+yy+'" stroke="#2A2E37" stroke-dasharray="3 3"/>';
    svg+='<text x="'+(padL-6)+'" y="'+(yy+4)+'" fill="#8A93A0" font-size="11" text-anchor="end">'+Math.round(kg.mn+(kg.mx-kg.mn)*fr)+'</text>';
    if(pct){ svg+='<text x="'+(padL+plotW+6)+'" y="'+(yy+4)+'" fill="#FFB020" font-size="11" text-anchor="start">'+Math.round(pct.mn+(pct.mx-pct.mn)*fr)+'</text>'; }
  }
  var step=Math.max(1,Math.ceil(n/6));
  weights.forEach(function(d,i){ if(i%step===0||i===n-1){ svg+='<text x="'+x(i).toFixed(1)+'" y="'+(H-8)+'" fill="#8A93A0" font-size="11" text-anchor="middle">'+fmtDate(d.date)+'</text>'; } });
  SERIES.forEach(function(s){ if(!show[s.key]) return; var useR=s.axis==="pct"; if(useR&&!pct) return;
    var pts=[]; weights.forEach(function(d,i){ if(d[s.key]!=null) pts.push([x(i),(useR?yR(d[s.key]):yL(d[s.key]))]); });
    if(!pts.length) return;
    var path=pts.map(function(p){ return p[0].toFixed(1)+","+p[1].toFixed(1); }).join(" ");
    svg+='<polyline points="'+path+'" fill="none" stroke="'+s.color+'" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>';
    pts.forEach(function(p){ svg+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="'+s.color+'"/>'; });
  });
  svg+='</svg>'; el.innerHTML=svg;
}
function drawHistory(){
  var h=document.getElementById("wHistory");
  h.innerHTML=weights.slice().reverse().map(function(e){
    var extra="";
    if(e.muscle!=null) extra+='<span class="tnum" style="font-size:12px; color:#3FE08F">'+e.muscle+' musc</span>';
    if(e.bodyfat!=null) extra+='<span class="tnum" style="font-size:12px; color:#FFB020">'+e.bodyfat+'% bf</span>';
    if(e.fatmass!=null) extra+='<span class="tnum" style="font-size:12px; color:#6FA8C9">'+e.fatmass+' fat</span>';
    return '<div class="row"><div style="display:flex; align-items:baseline; gap:12px; flex-wrap:wrap"><span style="font-weight:800; font-size:13px; min-width:56px">'+fmtDate(e.date)+'</span><span class="tnum" style="font-size:13px; color:#FF6A2C; font-weight:700">'+e.weight+' kg</span>'+extra+'</div><button class="delx" data-date="'+e.date+'">✕</button></div>';
  }).join("");
  var dels=h.querySelectorAll(".delx");
  for(var i=0;i<dels.length;i++){ (function(b){ b.addEventListener("click", function(){ weights=weights.filter(function(e){ return e.date!==b.dataset.date; }); save(K.weight,weights); drawWeightBody(); }); })(dels[i]); }
}

function renderGearTab(){
  var html='<div class="rise narrow">';
  html+='<div class="card" style="margin-bottom:16px"><div class="anton" style="font-size:18px; color:var(--molten); margin-bottom:4px">MY STACK</div><div style="font-size:11px; color:var(--steel); margin-bottom:13px">Type each supplement and your dose. Up to four.</div>';
  for(var c=0;c<4;c++){ html+='<div class="gcompound"><input class="winput" id="gName'+c+'" placeholder="Item '+(c+1)+' (e.g. Creatine)" value="'+esc(gear.compounds[c]?gear.compounds[c].name:"")+'"><input class="winput" id="gDose'+c+'" placeholder="Dose" value="'+esc(gear.compounds[c]?gear.compounds[c].dose:"")+'"></div>'; }
  html+='</div>';
  html+='<div class="card" style="margin-bottom:16px"><div class="anton" style="font-size:18px; color:var(--molten); margin-bottom:13px">DOSE REMINDER</div><div class="wtop" style="margin-bottom:12px"><div><label class="wlabel">LAST TAKEN</label><input class="winput" type="date" id="gDate" value="'+todayStr()+'"></div><div><label class="wlabel">REMIND EVERY (DAYS)</label><input class="winput" type="number" inputmode="numeric" id="gInterval" value="'+gear.interval+'"></div></div><button class="btn" id="gLog">LOG DOSE</button></div>';
  html+='<div id="gStatus"></div><div id="gHistory" style="margin-top:16px; display:flex; flex-direction:column; gap:8px"></div>';
  html+='<div style="margin-top:18px; font-size:11px; color:var(--steel); line-height:1.5; padding:0 4px"><b style="color:var(--text)">Note:</b> a home-screen web app can\'t fire phone alarms on its own. Use <b style="color:var(--amber)">“Add next dose to Calendar”</b> below to drop a real reminder into your phone calendar with an alert.</div></div>';
  content.innerHTML=html;
  for(var c2=0;c2<4;c2++){ (function(i){ document.getElementById("gName"+i).addEventListener("input", function(e){ gear.compounds[i].name=e.target.value; save(K.gear,gear); }); document.getElementById("gDose"+i).addEventListener("input", function(e){ gear.compounds[i].dose=e.target.value; save(K.gear,gear); }); })(c2); }
  document.getElementById("gInterval").addEventListener("input", function(e){ var v=parseInt(e.target.value,10); gear.interval=(isNaN(v)||v<1)?1:v; save(K.gear,gear); drawGearStatus(); });
  document.getElementById("gLog").addEventListener("click", function(){ var date=document.getElementById("gDate").value; if(!date) return; if(gear.log.indexOf(date)===-1){ gear.log.push(date); gear.log.sort(); save(K.gear,gear); } drawGearStatus(); drawGearHistory(); });
  drawGearStatus(); drawGearHistory();
}
function drawGearStatus(){
  var el=document.getElementById("gStatus");
  if(!gear.log.length){ el.innerHTML='<div class="card" style="text-align:center; color:var(--steel)"><div class="anton" style="font-size:20px; color:#3A3F49">NOTHING LOGGED</div><div style="font-size:12px; margin-top:6px">Log your first dose to start the schedule.</div></div>'; return; }
  var last=gear.log[gear.log.length-1], next=addDays(last,gear.interval), left=daysBetween(todayStr(),next);
  var leftTxt= left>1?("in "+left+" days") : left===1?"tomorrow" : left===0?"today" : (Math.abs(left)+" days overdue");
  var leftColor= left<0?"var(--molten)" : left===0?"var(--amber)" : "var(--text)";
  el.innerHTML='<div class="card" style="border-color:#FF8A3D55"><div class="statl" style="margin-bottom:6px">NEXT DOSE</div><div style="display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap"><div class="anton" style="font-size:30px">'+fmtDate(next)+'</div><div style="font-weight:800; font-size:14px; color:'+leftColor+'">'+leftTxt+'</div></div><div style="font-size:11px; color:var(--steel); margin-top:8px">Last taken '+fmtDate(last)+' · every '+gear.interval+' days · '+gear.log.length+' logged</div><button class="btn" id="gIcs" style="margin-top:13px">＋ ADD NEXT DOSE TO CALENDAR</button></div>';
  document.getElementById("gIcs").addEventListener("click", function(){ downloadIcs(next); });
}
function drawGearHistory(){
  var h=document.getElementById("gHistory"); if(!gear.log.length){ h.innerHTML=""; return; }
  h.innerHTML=gear.log.slice().reverse().map(function(date,ri){ var num=gear.log.length-ri;
    return '<div class="row"><div style="display:flex; align-items:baseline; gap:12px"><span class="anton" style="font-size:16px; color:var(--molten)">#'+num+'</span><span style="font-weight:700; font-size:13px">'+fmtDate(date)+'</span></div><button class="delx" data-date="'+date+'">✕</button></div>';
  }).join("");
  var dels=h.querySelectorAll(".delx");
  for(var i=0;i<dels.length;i++){ (function(b){ b.addEventListener("click", function(){ gear.log=gear.log.filter(function(d){ return d!==b.dataset.date; }); save(K.gear,gear); drawGearStatus(); drawGearHistory(); }); })(dels[i]); }
}
function downloadIcs(dateStr){
  var dt=dateStr.replace(/-/g,""), stamp=new Date().toISOString().replace(/[-:]/g,"").split(".")[0]+"Z", uid="forge-"+Date.now()+"@theforge";
  var ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//TheForge//Stack//EN","CALSCALE:GREGORIAN","BEGIN:VEVENT","UID:"+uid,"DTSTAMP:"+stamp,"DTSTART:"+dt+"T090000","DTEND:"+dt+"T091500","SUMMARY:Supplement reminder","DESCRIPTION:Next dose (logged in THE FORGE)","BEGIN:VALARM","TRIGGER:-PT30M","ACTION:DISPLAY","DESCRIPTION:Dose reminder","END:VALARM","END:VEVENT","END:VCALENDAR"].join("\r\n");
  var blob=new Blob([ics],{type:"text/calendar"}), url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download="dose-"+dateStr+".ics"; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(function(){ URL.revokeObjectURL(url); },1500);
}

function renderProtocolTab(){
  var secs=[{t:"CARDIO",c:"#FF6A2C",items:PROTOCOL.cardio},{t:"NUTRITION",c:"#FFB020",items:PROTOCOL.nutrition},{t:"GOLDEN RULES",c:"#FF4D2E",items:PROTOCOL.rules}];
  var html='<div class="rise narrow" style="display:flex; flex-direction:column; gap:14px">';
  secs.forEach(function(sec){ html+='<div class="card" style="padding-bottom:6px"><div class="anton" style="font-size:20px; color:'+sec.c+'; margin-bottom:10px">'+sec.t+'</div>';
    sec.items.forEach(function(it,i){ html+='<div style="display:flex; gap:10px; padding:8px 0; border-top:'+(i?"1px solid var(--line)":"none")+'"><span style="color:'+sec.c+'; font-weight:800">—</span><span style="font-size:13px; color:#D7DAE0; line-height:1.45">'+it+'</span></div>'; });
    html+='</div>'; });
  html+='<div class="card"><div class="anton" style="font-size:20px; color:#6FA8C9; margin-bottom:10px">TECHNIQUE GLOSSARY</div>';
  GLOSSARY.forEach(function(g,i){ html+='<div style="padding:10px 0; border-top:'+(i?"1px solid var(--line)":"none")+'"><div style="font-weight:800; font-size:13px; color:var(--amber)">'+g[0]+'</div><div style="font-size:12.5px; color:#C9CDD4; line-height:1.45; margin-top:3px">'+g[1]+'</div></div>'; });
  html+='</div>';
  html+='<div class="card"><div class="anton" style="font-size:20px; color:#6FA8C9; margin-bottom:6px">BACKUP</div><div style="font-size:12px; color:var(--steel); line-height:1.5; margin-bottom:13px">Export saves your weeks, weigh-ins, gear log and lifting numbers to a file. Import restores it on any device.</div><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px"><button class="btn ghost" id="expBtn">EXPORT</button><button class="btn ghost" id="impBtn">IMPORT</button></div><input type="file" id="impFile" accept="application/json" style="display:none"></div></div>';
  content.innerHTML=html;
  document.getElementById("expBtn").addEventListener("click", exportBackup);
  document.getElementById("impBtn").addEventListener("click", function(){ document.getElementById("impFile").click(); });
  document.getElementById("impFile").addEventListener("change", importBackup);
}
function exportBackup(){
  var data={ weeks:weeks, weekDone:weekDone, weights:weights, gear:gear, loads:loads, goal:goal, settings:settings, v:3 };
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}), url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download="forge-backup-"+todayStr()+".json"; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(function(){ URL.revokeObjectURL(url); },1500);
}
function importBackup(e){
  var f=e.target.files[0]; if(!f) return; var r=new FileReader();
  r.onload=function(){ try{ var d=JSON.parse(r.result);
    if(d.weeks) weeks=ensureWeeks(d.weeks); if(d.weekDone) weekDone=d.weekDone; if(d.weights) weights=d.weights; if(d.gear) gear=d.gear; if(d.loads) loads=d.loads; if(d.goal) goal=d.goal; if(d.settings) settings=d.settings;
    save(K.weeks,weeks); save(K.weekdone,weekDone); save(K.weight,weights); save(K.gear,gear); save(K.loads,loads); save(K.goal,goal); save(K.settings,settings);
    renderHeader(); renderTab(); alert("Backup restored.");
  }catch(err){ alert("Couldn't read that file."); } };
  r.readAsText(f);
}

renderHeader(); renderTab();
</script>
</body>
